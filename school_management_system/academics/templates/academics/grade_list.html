{% extends "base.html" %}
{% block title %}Manage Grades{% endblock %}
{% block content %}
    <h2>Manage Grades</h2>
    <a href="{% url 'grade_create' %}" class="btn btn-success mb-2">Add Grade</a>
    <table class="table table-striped">
        <thead>
            <tr>
                <th>Name</th>
                <th>Code</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            {% for grade in grades %}
                <tr>
                    <td>{{ grade.name }}</td>
                    <td>{{ grade.code }}</td>
                    <td>
                        <div class="action-buttons">
                            <a href="{% url 'grade_edit' grade.pk %}" class="action-btn edit-btn" title="Edit Grade">
                                <i class="fas fa-edit"></i>
                            </a>
                            <button type="button" class="action-btn delete-btn" title="Delete Grade" onclick="if(confirm('Are you sure you want to delete {{ grade.name }}? This action cannot be undone.')) { window.location.href='{% url 'grade_delete' grade.pk %}'; }">
                                <i class="fas fa-trash"></i>
                            </button>
                        </div>
                    </td>
                </tr>
            {% endfor %}
        </tbody>
    </table>
{% endblock %}
