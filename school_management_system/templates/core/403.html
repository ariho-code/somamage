{% extends "base.html" %}
{% block title %}Access Denied{% endblock %}
{% block content %}
<div class="container" style="padding: 60px 20px;">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-lg border-0" style="border-radius: 15px; overflow: hidden;">
                <div class="card-header text-center" style="background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%); color: white; padding: 30px;">
                    <h2 style="margin: 0; font-weight: 700;">
                        <i class="fas fa-lock"></i> Access Restricted
                    </h2>
                </div>
                <div class="card-body text-center" style="padding: 40px;">
                    <div style="font-size: 80px; color: #f59e0b; margin-bottom: 20px;">
                        <i class="fas fa-exclamation-triangle"></i>
                    </div>
                    <h3 style="margin-bottom: 15px; color: #1f2937; font-weight: 600;">Permission Required</h3>
                    <p style="color: #4b5563; font-size: 16px; line-height: 1.7; margin-bottom: 30px;">
                        You don't have the required permissions to access this feature. 
                        Please contact your administrator if you believe this is an error.
                    </p>
                    <a href="{% url 'home' %}" class="btn btn-primary btn-lg" style="padding: 12px 40px; font-weight: 600;">
                        <i class="fas fa-home"></i> Return to Dashboard
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // Show modal if this was loaded via JavaScript/AJAX
    if (typeof showPermissionWarning === 'function') {
        showPermissionWarning('You don\'t have the required permissions to access this feature. Please contact your administrator if you believe this is an error.');
    }
</script>
{% endblock %}
