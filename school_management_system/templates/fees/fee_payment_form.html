{% extends "base.html" %}
{% block page_title %}Record Fee Payment{% endblock %}
{% block content %}
<div class="card">
    <div class="card-header">
        <h3><i class="fas fa-money-bill"></i> Record Fee Payment</h3>
    </div>
    <div class="card-body">
        <form method="post">
            {% csrf_token %}
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label for="enrollment">Student:</label>
                    <select name="enrollment" id="enrollment" class="form-control" required>
                        <option value="">-- Select Student --</option>
                        {% for enrollment in enrollments %}
                        <option value="{{ enrollment.id }}">{{ enrollment.student }} - {{ enrollment.grade.name }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-6 mb-3">
                    <label for="term">Term:</label>
                    <select name="term" id="term" class="form-control" required>
                        <option value="">-- Select Term --</option>
                        {% for term in terms %}
                        <option value="{{ term.id }}">{{ term.name }} ({{ term.academic_year.name }})</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-6 mb-3">
                    <label for="amount_paid">Amount Paid:</label>
                    <input type="number" name="amount_paid" id="amount_paid" class="form-control" step="0.01" min="0" required>
                </div>
                <div class="col-md-6 mb-3">
                    <label for="payment_method">Payment Method:</label>
                    <select name="payment_method" id="payment_method" class="form-control" required>
                        <option value="cash">Cash</option>
                        <option value="bank">Bank Transfer</option>
                        <option value="mobile">Mobile Money</option>
                        <option value="cheque">Cheque</option>
                        <option value="other">Other</option>
                    </select>
                </div>
                <div class="col-md-6 mb-3">
                    <label for="notes">Notes:</label>
                    <textarea name="notes" id="notes" class="form-control" rows="2" placeholder="Optional notes"></textarea>
                </div>
            </div>
            <div class="form-group">
                <button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> Record Payment</button>
                <a href="{% url 'fee_balance_list' %}" class="btn btn-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
